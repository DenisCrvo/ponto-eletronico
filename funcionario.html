<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Registro de Ponto</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-funcionario">
  <main class="container-app">
    <header class="mb-3 text-center">
      <h2 class="app-title">Registro de Ponto</h2>
      <div id="data-atual" class="text-muted"></div>
      <div id="hora-atual" class="display-5 fw-bold"></div>
    </header>

    <section id="status-dia" class="card status-card mb-3">
      <div class="card-body">
        <h6 class="text-muted mb-2">Status do dia</h6>
        <ul id="lista-registros" class="list-unstyled mb-0"></ul>
      </div>
    </section>

    <section class="d-grid gap-2">
      <button id="btn-entrada" class="btn btn-success btn-lg btn-ponto" data-tipo="entrada">
        Registrar Entrada
      </button>
      <button id="btn-break-start" class="btn btn-warning btn-lg btn-ponto" data-tipo="break_start" disabled>
        Início Intervalo
      </button>
      <button id="btn-break-end" class="btn btn-info btn-lg btn-ponto text-white" data-tipo="break_end" disabled>
        Fim Intervalo
      </button>
      <button id="btn-saida" class="btn btn-danger btn-lg btn-ponto" data-tipo="saida" disabled>
        Registrar Saída
      </button>
    </section>

    <div id="alerta" class="alert mt-3 d-none" role="alert"></div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/funcionario.js"></script>
</body>
</html>
